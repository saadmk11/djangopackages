{% load i18n %}
<div class="extra-field-row bg-muted/20 flex flex-col items-center gap-4 rounded-md border p-4 md:flex-row">
    <div class="grid w-full flex-1 grid-cols-1 gap-4 md:grid-cols-2">
        <div>
            <span class="text-muted-foreground mb-1 block text-sm font-medium">{% translate "Label" %}</span>
            <div class="text-sm font-medium">{{ extra_field.label }}</div>
        </div>
        <div>
            <span class="text-muted-foreground mb-1 block text-sm font-medium">{% translate "URL" %}</span>
            <a href="{{ extra_field.url }}" target="_blank" class="text-primary block truncate text-sm hover:underline">{{ extra_field.url }}</a>
        </div>
    </div>
    <div class="flex flex-none gap-2">
        <button type="button"
                onclick="document.getElementById('extra-field-display-{{ extra_field.id }}').classList.add('hidden'); document.getElementById('extra-field-form-{{ extra_field.id }}').classList.remove('hidden');"
                class="ring-offset-background hover:bg-accent hover:text-accent-foreground focus-visible:ring-ring inline-flex h-10 w-10 items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50"
                title="{% translate 'Edit' %}">
            <i class="ph-bold ph-pencil-simple text-lg"></i>
        </button>
        <button type="button"
                hx-delete="{% url 'profile_delete_extra_field' extra_field.id %}"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-confirm="{% translate 'Are you sure you want to delete this field?' %}"
                hx-target="#extra-field-row-{{ extra_field.id }}"
                hx-swap="outerHTML"
                class="ring-offset-background focus-visible:ring-ring inline-flex h-10 w-10 items-center justify-center rounded-md text-sm font-medium text-red-600 transition-colors hover:bg-red-100 hover:text-red-700 focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 dark:text-red-400 dark:hover:bg-red-500/15 dark:hover:text-red-300"
                title="{% translate 'Delete' %}">
            <i class="ph-bold ph-trash text-lg"></i>
        </button>
    </div>
</div>
