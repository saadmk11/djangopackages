{% load i18n %}
<div class="flex flex-wrap gap-2">
    <button
        hx-get="{{ list_url }}?category=all&sort={{ current_sort }}&q={{ search_query }}"
        hx-target="#package-list-container"
        hx-push-url="true"
        hx-indicator="#package-list-spinner"
        class="{% if current_category == 'all' %}bg-primary text-primary-foreground border-primary hover:bg-primary/90{% else %}bg-background text-muted-foreground border-border hover:bg-accent hover:text-accent-foreground{% endif %} inline-flex items-center rounded-full border px-4 py-2 text-sm font-medium transition-colors">
        {% translate "All" %}
        <span class="ml-2 text-xs">({{ total_count }})</span>
    </button>
    {% for category in categories %}
        <button
            hx-get="{{ list_url }}?category={{ category.slug }}&sort={{ current_sort }}&q={{ search_query }}"
            hx-target="#package-list-container"
            hx-push-url="true"
            hx-indicator="#package-list-spinner"
            class="{% if current_category == category.slug %}bg-primary text-primary-foreground border-primary hover:bg-primary/90{% else %}bg-background text-muted-foreground border-border hover:bg-accent hover:text-accent-foreground{% endif %} inline-flex items-center rounded-full border px-4 py-2 text-sm font-medium transition-colors">
            {{ category.title }}
            <span class="ml-2 text-xs">({{ category.package_count }})</span>
        </button>
    {% endfor %}
</div>
